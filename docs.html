  <script>
    document.querySelectorAll('.fold-toggle').forEach(function(toggle) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var parent = toggle.closest('.foldable');
        var content = parent.querySelector('.fold-content');
        var isOpen = content.style.display === 'block';
        document.querySelectorAll('.fold-content').forEach(function(ul) {
          ul.style.display = 'none';
          var btn = ul.parentElement.querySelector('.fold-toggle');
          if (btn) btn.innerHTML = '&#9654;';
        });
        if (!isOpen) {
          content.style.display = 'block';
          toggle.innerHTML = '&#9660;';
        } else {
          content.style.display = 'none';
          toggle.innerHTML = '&#9654;';
        }
      });
    });
  </script>
